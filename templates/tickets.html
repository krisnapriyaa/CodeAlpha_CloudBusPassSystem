<!DOCTYPE html>
<html>
<head>
<title>Booked Tickets</title>

<style>

body{
margin:0;
font-family:Segoe UI;
text-align:center;
background:linear-gradient(120deg,#84fab0,#8fd3f4);
}

h1{
margin-top:40px;
color:#222;
}

table{
margin:auto;
margin-top:40px;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

th{
background:#333;
color:white;
padding:12px 20px;
}

td{
padding:12px 20px;
}

tr:nth-child(even){
background:#f2f2f2;
}

button{
padding:5px 12px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkred;
}

</style>
</head>

<body>

<h1>🚌 Booked Bus Tickets</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Source</th>
<th>Destination</th>
<th>Time</th>
<th>Seat</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for row in data %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>

<td>
<a href="/cancel/{{row[0]}}">
<button>Cancel</button>
</a>
</td>

</tr>

{% endfor %}

</table>

<br><br>

<a href="/">Back Home</a>

</body>
</html>
